<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Project - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #0a0a16; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* कंटेनर स्टाइल्स */
        .game-box { background: rgba(20, 20, 43, 0.85); padding: 40px; border-radius: 15px; width: 400px; text-align: center; border: 2px solid #00ffcc; box-shadow: 0 0 20px #00ffcc33; position: relative; }
        h2 { color: #00ffcc; margin-bottom: 30px; letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 0 10px #00ffcc77; }
        
        /* बटन्स */
        .btn { display: block; width: 100%; padding: 15px; margin: 15px 0; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; }
        .btn-guest { background: #e67e22; color: white; box-shadow: 0 4px 15px rgba(230, 126, 34, 0.4); }
        .btn-guest:hover { background: #d35400; transform: translateY(-2px); }
        .btn-fb { background: #1877f2; color: white; box-shadow: 0 4px 15px rgba(24, 119, 242, 0.4); }
        .btn-fb:hover { background: #145dbf; transform: translateY(-2px); }
        
        /* फेसबुक फॉर्म पॉपअप */
        .fb-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 10; }
        .fb-box { background: #fff; color: #000; padding: 30px; border-radius: 10px; width: 340px; text-align: left; box-shadow: 0 5px 25px rgba(0,0,0,0.5); }
        .fb-box h3 { color: #1877f2; font-size: 24px; margin-bottom: 20px; text-align: center; }
        .fb-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        .btn-fb-submit { background: #1877f2; color: #fff; margin-top: 15px; }
        
        /* Tap To Begin स्क्रीन */
        .tap-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #050510; border-radius: 13px; flex-direction: column; justify-content: center; align-items: center; z-index: 5; }
        .tap-text { font-size: 20px; color: #00ffcc; font-weight: bold; animation: blink 1.5s infinite; cursor: pointer; text-transform: uppercase; margin-top: 20px; }
        
        /* गेम लॉबी */
        .lobby-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a3a 0%, #050510 100%); border-radius: 13px; flex-direction: column; justify-content: center; align-items: center; z-index: 6; p: 20px; }
        .btn-play { background: #00ffcc; color: #050510; width: 80%; box-shadow: 0 0 15px #00ffccbb; }
        .status-bar { font-size: 14px; color: #aaa; margin-bottom: 20px; }

        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="game-box">
        <!-- 1. मुख्य लॉगिन स्क्रीन -->
        <div id="login-interface">
            <h2>Nexus Project</h2>
            <button class="btn btn-guest" onclick="handleGuestLogin()">Guest Login</button>
            <button class="btn btn-fb" onclick="openFbModal()">Login with Facebook</button>
        </div>

        <!-- 2. Tap To Begin स्क्रीन -->
        <div id="tap-interface" class="tap-screen">
            <h3 style="color: #fff;">WELCOME, <span id="user-display" style="color: #00ffcc;">PLAYER</span></h3>
            <div class="tap-text" onclick="enterLobby()">— TAP TO BEGIN —</div>
        </div>

        <!-- 3. गेम लॉ比 (Lobby) -->
        <div id="lobby-interface" class="lobby-screen">
            <h2 style="font-size: 20px;">NEXUS LOBBY</h2>
            <div class="status-bar">Login Mode: <span id="mode-display" style="font-weight:bold;">None</span></div>
            <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; margin-bottom: 30px; width: 90%;">
                <p>Coins: 999,999</p>
                <p>Diamonds: 99,999</p>
            </div>
            <button class="btn btn-play" onclick="startGameplay()">START MATCH</button>
        </div>
    </div>

    <!-- फेसबुक क्रेडेंशियल पॉपअप -->
    <div id="fb-modal" class="fb-modal">
        <div class="fb-box">
            <h3>facebook</h3>
            <input type="text" id="fb-email" placeholder="Mobile number or email address" required>
            <input type="password" id="fb-pass" placeholder="Password" required>
            <button class="btn btn-fb-submit" onclick="handleFbLogin()">Log In</button>
            <button class="btn" style="background:#ddd; color:#333; margin-top:5px;" onclick="closeFbModal()">Cancel</button>
        </div>
    </div>

    <script>
        let loginMode = ""; // यह ट्रैक करेगा कि लॉगिन गेस्ट है या फेसबुक

        // गेस्ट लॉगिन - ऑटोमैटिक
        function handleGuestLogin() {
            loginMode = "GUEST";
            document.getElementById("user-display").innerText = "GUEST_USER";
            document.getElementById("mode-display").innerText = "GUEST (Match Disabled)";
            document.getElementById("mode-display").style.color = "#e67e22";
            
            // सीधे 'Tap To Begin' पर भेजें
            document.getElementById("login-interface").style.display = "none";
            document.getElementById("tap-interface").style.display = "flex";
        }

        // फेसबुक लॉगिन विंडो खोलना/बंद करना
        function openFbModal() { document.getElementById("fb-modal").style.display = "flex"; }
        function closeFbModal() { document.getElementById("fb-modal").style.display = "none"; }

        // फेसबुक क्रेडेंशियल सबमिट होने के बाद
        function handleFbLogin() {
            const email = document.getElementById("fb-email").value;
            const pass = document.getElementById("fb-pass").value;

            if(email === "" || pass === "") {
                alert("Please enter valid Facebook credentials!");
                return;
            }

            console.log("Logged via FB:", email); // डिबगिंग के लिए
            loginMode = "FACEBOOK";
            document.getElementById("user-display").innerText = "FB_MASTER_PLAYER";
            document.getElementById("mode-display").innerText = "FACEBOOK (Premium Verified)";
            document.getElementById("mode-display").style.color = "#00ffcc";

            // पॉपअप बंद करें और 'Tap To Begin' स्क्रीन दिखाएं
            closeFbModal();
            document.getElementById("login-interface").style.display = "none";
            document.getElementById("tap-interface").style.display = "flex";
        }

        // टैप टू बिगिन पर क्लिक करने के बाद लॉबी खोलना
        function enterLobby() {
            document.getElementById("tap-interface").style.display = "none";
            document.getElementById("lobby-interface").style.display = "flex";
        }

        // गेम खेलने की कंडीशन (आपका मुख्य अंतर यहाँ लागू होता है)
        function startGameplay() {
            if (loginMode === "GUEST") {
                alert("❌ ACCESS DENIED!\nGuest accounts cannot play matches. Please login with Facebook to play the game.");
            } else if (loginMode === "FACEBOOK") {
                alert("🎮 MATCH FOUND!\nEntering the Nexus World... Game Started Successfully!");
                // यहाँ आप अपने असली गेमप्ले सीन या यूआरएल का रीडायरेक्ट कोड डाल सकते हैं
            }
        }
    </script>
</body>
</html>
